<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Dragon Ultra</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .lang-toggle button {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 14px;
            color: #999;
            cursor: pointer;
            padding: 2px 4px;
            transition: color 0.2s;
        }

        .lang-toggle button.active {
            color: #4430D9;
            font-weight: 700;
        }

        .lang-toggle span {
            color: #ccc;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 24px;
            text-align: center;
        }

        .logo {
            max-width: 230px;
            width: 100%;
            height: auto;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #000;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

.cta {
            display: inline-block;
            background: #4430D9;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 9999px;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .cta:hover {
            background: #3626b3;
            box-shadow: 0 4px 14px rgba(68, 48, 217, 0.3);
        }

        @media (max-width: 480px) {
            .logo {
                max-width: 180px;
            }

            h1 {
                font-size: 24px;
            }

.cta {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="lang-toggle">
        <button id="btn-es" class="active" onclick="setLang('es')">ES</button>
        <span>|</span>
        <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <img src="logo.png" alt="White Dragon Ultra" class="logo">
        <h1 id="title">RESERVA TU PACK DE FOTO Y V&Iacute;DEO PARA WNBF</h1>
        <a id="cta-btn" class="cta" href="https://9a8892-89.myshopify.com" target="_blank" rel="noopener noreferrer">Acceder a la web oficial</a>
    </div>

    <script>
        var texts = {
            es: {
                title: 'RESERVA TU PACK DE FOTO Y V\u00cdDEO PARA WNBF',
                cta: 'Acceder a la web oficial'
            },
            en: {
                title: 'BOOK YOUR PHOTO AND VIDEO PACK FOR WNBF',
                cta: 'Access the official website'
            }
        };

        function setLang(lang) {
            document.getElementById('title').textContent = texts[lang].title;
            document.getElementById('cta-btn').textContent = texts[lang].cta;
            document.getElementById('btn-es').className = lang === 'es' ? 'active' : '';
            document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
            document.documentElement.lang = lang;
        }
    </script>
</body>
</html>
